<!DOCTYPE html>
<html lang="zh-CN" data-theme="ink" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航 — haome525</title>
  <meta name="description" content="haome525 的个人技术工具导航 — AI · 开发 · 效率精选">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/nav.css">
  <script>
    (function(){
      try{
        var t=localStorage.getItem('hao-theme')||'ink';
        var m=localStorage.getItem('hao-mode');
        if(!m)m=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
        document.documentElement.setAttribute('data-theme',t);
        document.documentElement.setAttribute('data-mode',m);
      }catch(e){}
    })();
  </script>
</head>
<body>

  <nav class="topnav">
    <div class="topnav-inner">
      <a href="/" class="topnav-brand">haome525</a>
      <div class="topnav-links">
        <a href="/">首页</a>
        <a href="/nav/">精选</a>
        <a href="/navigation/" class="active">导航</a>
        <a href="/works/">作品</a>
        <a href="/projects/">项目</a>
        <a href="/blog/">博客</a>
        <a href="/tech/">技术</a>
        <a href="/about/">关于</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>🧭 我的工具导航</h1>
      <p class="hero-sub">精选 AI · 开发 · 效率工具，每个都值得收藏</p>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索工具名称、描述或标签…" autocomplete="off">
        <div class="search-engines">
          <button class="engine-btn active" data-engine="local" title="站内搜索">站内</button>
          <button class="engine-btn" data-engine="bing" title="Bing 搜索">Bing</button>
          <button class="engine-btn" data-engine="google" title="Google 搜索">Google</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="cat-bar" id="catBar"></div>
    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <i class="fas fa-search"></i>
      <p>没有找到匹配的工具</p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 haome525 · <a href="/">返回主站</a></p>
  </footer>

  <script src="assets/js/nav.js"></script>
</body>
</html>
